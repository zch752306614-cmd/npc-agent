server:
  port: 59999

spring:
  application:
    name: npc-agent
  
  datasource:
    url: jdbc:mysql://localhost:3306/npc_agent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

milvus:
  host: localhost
  port: 19530
  database: npcagent
  collection-name: npc_agent_vectors
  embedding-dimension: 768

# Ollama Configuration
ollama:
  base-url: http://localhost:11434
  chat:
    model: qwen3.5
    temperature: 0.7
  embedding:
    model: bge-m3

logging:
  level:
    com.npcagent: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
